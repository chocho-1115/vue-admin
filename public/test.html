<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图标</title>
  <style>
    /* ============================================
       1. 基础布局样式
       ============================================ */
    body {
      margin: 0;
      min-height: 100vh;
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    svg {
      width: 64px;
      height: 64px;
      color: #966;
      overflow: hidden;
      cursor: pointer;
    }

    /* ============================================
       2. 通用样式类
       ============================================ */
    .iy2otu {
      stroke-width: var(--svg-stroke-width, 1.5px);
    }

    .r1menc {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .zxndow {
      stroke: #fff;
    }

    .nf43cj {
      fill: #000;
    }

    .mc7__g {
      fill: #fff;
    }

    /* ============================================
       3. 路径定义 - 默认状态
       ============================================ */
    .ojpz4b {
      d: path("M9.88 2.75H9.5c-3.73 0-6.75 3.02-6.75 6.75c0 3.73 3.02 6.75 6.75 6.75c2.7 0 5.05-1.6 6.12-3.9c-2.6 1.2-5.75 0.3-7.25-2.29c-1.43-2.51-0.75-5.62 1.5-7.31Z");
      fill-opacity: 0;
    }

    .gi0z3g {
      d: path("M24 0h24v24H0Z");
    }

    .ppni7q {
      d: path("M14.5 10.75c2.07 0 3.75 1.68 3.75 3.75c0 2.07-1.68 3.75-3.75 3.75c-2.07 0-3.75-1.68-3.75-3.75c0-2.07 1.68-3.75 3.75-3.75Z");
      fill-opacity: 0;
    }

    .qcro3x {
      d: path("M24 0h-48v24H0Z");
    }

    .zdx8to {
      d: path("M0 0h24v24H0Z");
    }

    .z3aezd {
      fill: var(--svg-primary-color, currentColor);
    }

    .b9a3-f {
      fill: var(--svg-secondary-color, currentColor);
    }

    .zcx7gx {
      stroke: var(--svg-tertiary-color, currentColor);
    }

    .al390y {
      stroke: #000;
      stroke-width: var(--svg-mask-width, calc(var(--svg-stroke-width, 1.5px) + 1px));
    }

    .tho5eb {
      d: path("M9.88 2.75c-2.25 1.69-2.93 4.8-1.5 7.31c1.5 2.59 4.65 3.49 7.25 2.29");
    }

    .p04bsl {
      d: path("M9.88 2.75H9.5c-3.73 0-6.75 3.02-6.75 6.75c0 3.73 3.02 6.75 6.75 6.75c2.7 0 5.05-1.6 6.12-3.9");
    }

    .hr24xi {
      d: path("M12 12L22 2M12 12L2 22");
    }

    .xjtsfr {
      d: path("M14.5 10.75c2.07 0 3.75 1.68 3.75 3.75c0 2.07-1.68 3.75-3.75 3.75c-2.07 0-3.75-1.68-3.75-3.75c0-2.07 1.68-3.75 3.75-3.75Z");
    }

    .k_9rcu {
      d: path("M14.5 7.75V7M14.5 21.25V22M7.75 14.5H7M21.25 14.5H22");
    }

    .o-7hce {
      d: path("M9.63 9.63L9.25 9.25M9.63 19.38l-0.38 0.38M19.38 9.63l0.38-0.38M19.38 19.38l0.38 0.38");
    }

    /* ============================================
       4. 状态变化 - state-light / state-dark
       ============================================ */
    svg.state-dark .ojpz4b {
      d: path("M12.5 3H12c-4.97 0-9 4.03-9 9c0 4.97 4.03 9 9 9c3.6 0 6.73-2.13 8.16-5.2c-3.46 1.6-7.66 0.4-9.66-3.05c-1.9-3.35-1-7.49 2-9.75Z");
    }

    svg.state-dark .gi0z3g {
      d: path("M48 0h24v24H24Z");
    }

    svg.state-dark .qcro3x {
      d: path("M48 0H0v24h24Z");
    }

    svg.state-dark .tho5eb {
      d: path("M12.5 3c-3 2.26-3.9 6.4-2 9.75c2 3.45 6.2 4.65 9.66 3.05");
    }

    svg.state-dark .p04bsl {
      d: path("M12.5 3H12c-4.97 0-9 4.03-9 9c0 4.97 4.03 9 9 9c3.6 0 6.73-2.13 8.16-5.2");
    }

    svg.state-dark .hr24xi {
      d: path("M26 26l10-10M26 26L16 36");
    }

    svg.state-light .gi0z3g {
      d: path("M0 0h24v24h-48Z");
    }

    svg.state-light .ppni7q {
      d: path("M12 7c2.76 0 5 2.24 5 5c0 2.76-2.24 5-5 5c-2.76 0-5-2.24-5-5c0-2.76 2.24-5 5-5Z");
    }

    svg.state-light .qcro3x {
      d: path("M0 0h-48v24h24Z");
    }

    svg.state-light .xjtsfr {
      d: path("M12 7c2.76 0 5 2.24 5 5c0 2.76-2.24 5-5 5c-2.76 0-5-2.24-5-5c0-2.76 2.24-5 5-5Z");
    }

    svg.state-light .hr24xi {
      d: path("M-2-2L8-12M-2-2L-12 8");
    }

    svg.state-light .k_9rcu {
      d: path("M12 3V2M12 21v1M3 12H2M21 12h1");
    }

    svg.state-light .o-7hce {
      d: path("M5.5 5.5L5 5M5.5 18.5L5 19M18.5 5.5L19 5M18.5 18.5L19 19");
    }

    /* ============================================
       5. 动画 - 过渡 + 关键帧
       ============================================ */
    @media not (prefers-reduced-motion) {
      .ojpz4b {
        transition: d .4s linear, fill-opacity .4s linear;
      }
      .gi0z3g {
        transition: d .4s linear;
      }
      .ppni7q {
        transition: d .4s linear, fill-opacity .4s linear;
      }
      .qcro3x {
        transition: d .4s linear;
      }
      .tho5eb {
        transition: d .4s linear;
      }
      .p04bsl {
        transition: d .4s linear;
      }
      .hr24xi {
        transition: d .4s linear;
      }
      .xjtsfr {
        transition: d .4s linear;
      }
      .k_9rcu {
        transition: d .4s linear;
      }
      .o-7hce {
        transition: d .4s linear;
      }

      /* 入场动画 - 只有首次加载且没有 state-static 时才触发 */
      svg:not(.state-static) .mc7__g {
        animation: fade-to-1 .4s linear .4s forwards;
        opacity: 0;
      }

      svg:not(.state-static) .tho5eb {
        animation: so-from-28 .4s linear forwards;
        stroke-dasharray: 28;
      }

      svg:not(.state-static) .p04bsl {
        animation: so-from-44 .4s linear forwards;
        stroke-dasharray: 44;
      }

      svg:not(.state-static) .hr24xi {
        animation: so-from-18 .4s linear forwards;
        stroke-dasharray: 18;
      }

      svg:not(.state-static) .xjtsfr {
        animation: so-from-34 .4s linear forwards;
        stroke-dasharray: 34;
      }

      svg:not(.state-static) .k_9rcu {
        animation: so-to-0 .4s linear .8s forwards;
        stroke-dasharray: 6;
        stroke-dashoffset: 6;
      }

      svg:not(.state-static) .o-7hce {
        animation: so-to-0 .4s linear 1s forwards;
        stroke-dasharray: 6;
        stroke-dashoffset: 6;
      }
    }

    @keyframes fade-to-1 {
      to {
        opacity: 1;
      }
    }

    @keyframes so-from-28 {
      0% {
        stroke-dashoffset: 28;
      }
    }

    @keyframes so-from-44 {
      0% {
        stroke-dashoffset: 44;
      }
    }

    @keyframes so-from-18 {
      0% {
        stroke-dashoffset: 18;
      }
    }

    @keyframes so-from-34 {
      0% {
        stroke-dashoffset: 34;
      }
    }

    @keyframes so-to-0 {
      to {
        stroke-dashoffset: 0;
      }
    }
  </style>
</head>

<body>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="state-static">
    <defs>
      <mask id="SVGV2z6rcVJ">
        <path class="mc7__g ojpz4b" />
        <path class="iy2otu r1menc tho5eb zxndow" />
        <path class="iy2otu p04bsl r1menc zxndow" />
        <path class="gi0z3g nf43cj" />
        <path class="al390y hr24xi r1menc" />
      </mask>
      <mask id="SVGwSDhBe6E">
        <path class="mc7__g ppni7q" />
        <path class="iy2otu r1menc xjtsfr zxndow" />
        <path class="nf43cj qcro3x" />
        <path class="al390y hr24xi r1menc" />
      </mask>
      <mask id="SVG48m1YcIw">
        <path class="iy2otu k_9rcu r1menc zxndow" />
        <path class="iy2otu o-7hce r1menc zxndow" />
        <path class="nf43cj qcro3x" />
        <path class="al390y hr24xi r1menc" />
      </mask>
    </defs>
    <path mask="url(#SVGV2z6rcVJ)" class="z3aezd zdx8to" />
    <path mask="url(#SVGwSDhBe6E)" class="z3aezd zdx8to" />
    <path mask="url(#SVG48m1YcIw)" class="b9a3-f zdx8to" />
    <path class="hr24xi iy2otu r1menc zcx7gx" />
  </svg>

  <script>
    const element = document.querySelector('.state-static');
    if (element) {
      let isLight = true;
      element.addEventListener('click', function() {
        this.classList.remove('state-light', 'state-dark');
        this.classList.add(isLight ? 'state-dark' : 'state-light');
        isLight = !isLight;
      });
    }
  </script>
</body>
</html>
