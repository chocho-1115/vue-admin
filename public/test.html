<script>
  // 找到第一个带有 state-static 类名的元素
const element = document.querySelector('.state-static');

// 如果元素存在，才绑定事件
if (element) {
  // 用于记录当前状态，true 表示 light，false 表示 dark
  let isLight = true;

  element.addEventListener('click', function() {
    // 移除现有的状态类
    this.classList.remove('state-light', 'state-dark');

    if (isLight) {
      // 如果当前是 light 状态，切换为 dark
      this.classList.add('state-dark');
    } else {
      // 如果当前是 dark 状态，切换为 light
      this.classList.add('state-light');
    }

    // 翻转状态值，为下一次点击做准备
    isLight = !isLight;
  });
}
</script>
